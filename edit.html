<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Level Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e24; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Top Bar & Sidebar */
        #top-bar { height: 50px; background: #2b2d42; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid #3d405b; z-index: 10; }
        #top-bar h1 { font-size: 18px; color: #4ea8de; }
        .action-btns { display: flex; gap: 10px; }

        .btn { padding: 7px 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-green { background: #2ecc71; color: white; } .btn-green:hover { background: #27ae60; }
        .btn-blue { background: #3498db; color: white; } .btn-blue:hover { background: #2980b9; }
        .btn-purple { background: #9b59b6; color: white; } .btn-purple:hover { background: #8e44ad; }
        .btn-dark { background: #4a4e69; color: white; } .btn-dark:hover { background: #6c757d; }
        .btn-icon { width: 16px; height: 16px; object-fit: contain; }

        #main-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        #sidebar { width: 260px; background: #2b2d42; border-right: 2px solid #3d405b; padding: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 5; overflow-y: auto; }
        #sidebar h3 { font-size: 14px; color: #8d99ae; text-transform: uppercase; margin-bottom: 5px; }
        #dynamic-buttons { display: flex; flex-direction: column; gap: 8px; }

        /* Inspector Panel */
        #inspector-panel { display: none; border-top: 2px solid #3d405b; padding-top: 15px; margin-top: 5px; }
        .prop-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .prop-group label { font-size: 12px; color: #8d99ae; font-weight: bold; }
        .input-unit { display: flex; align-items: center; gap: 4px; }
        .input-unit input, .input-unit select { width: 100px; background: #101014; border: 1px solid #4a4e69; color: #2ecc71; border-radius: 4px; padding: 5px 6px; font-weight: bold; font-size: 12px; outline: none; }
        .input-unit input:focus, .input-unit select:focus { border-color: #4ea8de; }
        .input-unit span { font-size: 11px; color: #8d99ae; }

        /* Workspace & Canvas */
        #workspace { flex: 1; position: relative; background: #101014; overflow: hidden; cursor: grab; }
        #workspace:active { cursor: grabbing; }

        #canvas {
            position: absolute; width: 5000px; height: 2000px; transform-origin: 0 0; background: #141419;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }

        /* Boundaries & Zoom */
        .world-bounds { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .camera-frame { position: absolute; top: 0; left: 0; width: 800px; height: 400px; border: 2px dashed #f39c12; box-shadow: inset 0 0 20px rgba(243, 156, 18, 0.15); }
        .boundary-line-left { position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #2ecc71; }
        .boundary-line-bottom { position: absolute; top: 400px; left: 0; width: 100%; height: 4px; background: #e74c3c; }

        .boundary-badge { position: absolute; background: rgba(0,0,0,0.85); color: white; font-size: 12px; font-weight: bold; padding: 5px 12px; border-radius: 6px; pointer-events: none; }
        .badge-origin { top: 12px; left: 12px; background: #2ecc71; color: #111; z-index: 10; }
        .badge-camera { top: 12px; left: 550px; background: #f39c12; color: #111; }
        .badge-left { top: 60px; left: 12px; border-left: 3px solid #2ecc71; }
        .badge-bottom { top: 412px; left: 12px; background: #c0392b; }

        #zoom-controls { position: absolute; bottom: 20px; right: 20px; background: rgba(43,45,66,0.9); border: 1px solid #3d405b; padding: 6px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; z-index: 20; }
        #zoom-controls button { background: #4a4e69; color: white; border: none; width: 28px; height: 28px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #zoom-controls button:hover { background: #4ea8de; }
        #zoom-text { font-size: 13px; font-weight: bold; width: 50px; text-align: center; color: #4ea8de; }

        /* Objects & Handles */
        .game-object { position: absolute; background-size: 100% 100%; background-position: center; border: 1px solid transparent; cursor: move; z-index: 3; }
        .game-object:hover { outline: 2px dashed #4ea8de; }
        .game-object.selected { outline: 2px solid #f1c40f !important; }
        .delete-btn { position: absolute; top: -10px; right: -10px; width: 20px; height: 20px; background: #e74c3c; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 20; }
        .game-object:hover .delete-btn, .game-object.selected .delete-btn { display: flex; }

        .resize-handle { position: absolute; z-index: 10; display: none; }
        .game-object:hover .resize-handle, .game-object.selected .resize-handle { display: block; }
        .resize-handle.handle-t { top: -6px; left: 8px; right: 8px; height: 12px; cursor: ns-resize; }
        .resize-handle.handle-b { bottom: -6px; left: 8px; right: 8px; height: 12px; cursor: ns-resize; }
        .resize-handle.handle-l { left: -6px; top: 8px; bottom: 8px; width: 12px; cursor: ew-resize; }
        .resize-handle.handle-r { right: -6px; top: 8px; bottom: 8px; width: 12px; cursor: ew-resize; }
        .resize-handle.handle-tl, .resize-handle.handle-tr, .resize-handle.handle-bl, .resize-handle.handle-br { width: 10px; height: 10px; background: #f1c40f; border: 1px solid #111; border-radius: 2px; z-index: 15; }
        .resize-handle.handle-tl { top: -5px; left: -5px; cursor: nwse-resize; }
        .resize-handle.handle-tr { top: -5px; right: -5px; cursor: nesw-resize; }
        .resize-handle.handle-bl { bottom: -5px; left: -5px; cursor: nesw-resize; }
        .resize-handle.handle-br { bottom: -5px; right: -5px; cursor: nwse-resize; }

        .pipe-badge { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.75); color: #2ecc71; font-size: 10px; padding: 1px 4px; border-radius: 3px; font-family: monospace; pointer-events: none; }

        /* Modal */
        #playtest-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        #playtest-container { width: 90vw; height: 88vh; background: #1a252f; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 2px solid #34495e; }
        #playtest-header { background: #2c3e50; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #34495e; }
        #playtest-header h4 { color: #2ecc71; margin: 0; font-size: 16px; }
        .close-playtest-btn { background: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #playtest-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1>🛠️ 2D Level Editor</h1>
        <div class="action-btns">
            <button class="btn btn-green" onclick="startPlaytest()">🎮 ทดลองเล่นด่าน</button>
            <button class="btn btn-purple" onclick="exportJSON()">📥 ส่งออก level.json</button>
            <button class="btn btn-dark" onclick="importJSON()">📤 โหลดไฟล์ JSON</button>
            <input type="file" id="file-input" accept=".json" style="display: none;" onchange="handleFileSelect(event)">
        </div>
    </div>

    <div id="main-container">
        <div id="sidebar">
            <h3>รายการวัตถุ (Objects)</h3>
            <div id="dynamic-buttons"><p style="font-size: 12px; color: #aaa;">กำลังโหลด data/objects.json...</p></div>

            <div id="inspector-panel">
                <h3>คุณสมบัติวัตถุ</h3>
                <div class="prop-group"><label>กว้าง (W):</label><div class="input-unit"><input type="number" id="inp-w" min="1" step="10"><span>px</span></div></div>
                <div class="prop-group"><label>สูง (H):</label><div class="input-unit"><input type="number" id="inp-h" min="1" step="10"><span>px</span></div></div>
                <div class="prop-group"><label>ตำแหน่ง X:</label><div class="input-unit"><input type="number" id="inp-x" step="10"><span>px</span></div></div>
                <div class="prop-group"><label>ตำแหน่ง Y:</label><div class="input-unit"><input type="number" id="inp-y" step="10"><span>px</span></div></div>
                <div id="pipe-link-group" class="prop-group" style="display: none;">
                    <label>มุดไปท่อ:</label>
                    <div class="input-unit"><select id="sel-target-pipe"><option value="">-- ไม่วาร์ป --</option></select></div>
                </div>
            </div>
        </div>

        <div id="workspace">
            <div id="canvas">
                <div class="world-bounds">
                    <div class="camera-frame"></div>
                    <div class="boundary-line-left"></div>
                    <div class="boundary-line-bottom"></div>
                    <div class="boundary-badge badge-origin">🚩 จุดเริ่มด่าน (X: 0, Y: 0)</div>
                    <div class="boundary-badge badge-camera">📺 จอกล้องเกม (800 × 400px)</div>
                    <div class="boundary-badge badge-left">⬅️ ขอบซ้ายสุด (X: 0)</div>
                    <div class="boundary-badge badge-bottom">⚠️ ขอบล่างหน้าจอ / ตกแมพตาย (Y: 400)</div>
                </div>
                <svg id="svg-layer"></svg>
            </div>

            <div id="zoom-controls">
                <button onclick="changeZoom(-0.1)">-</button>
                <span id="zoom-text">100%</span>
                <button onclick="changeZoom(0.1)">+</button>
                <button onclick="resetZoom()" style="width: auto; padding: 0 8px;">Reset</button>
            </div>
        </div>
    </div>

    <div id="playtest-modal">
        <div id="playtest-container">
            <div id="playtest-header">
                <h4>🎮 หน้าต่างทดลองเล่นด่าน</h4>
                <button class="close-playtest-btn" onclick="closePlaytest()">❌ ปิดหน้าต่าง (ESC)</button>
            </div>
            <iframe id="playtest-iframe" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);

        let loadedObjectTypes = {}, pipeCounter = 1, selectedObj = null;
        let scale = 1, viewX = 0, viewY = 0, isPanning = false, panStart = { x: 0, y: 0 };
        const gridSize = 20, keys = {};

        const svgToUrl = svg => `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;

        // โหลดปุ่มวัตถุ
        async function loadObjectsDefinition() {
            try {
                loadedObjectTypes = await (await fetch('data/objects.json')).json();
                $('#dynamic-buttons').innerHTML = Object.entries(loadedObjectTypes).map(([type, def]) => `
                    <button class="btn btn-blue" onclick="createObject('${type}')">
                        ${def.svg ? `<img class="btn-icon" src="${svgToUrl(def.svg)}">` : ''}
                        + ${def.name || type}
                    </button>
                `).join('');
            } catch (e) {
                $('#dynamic-buttons').innerHTML = '<p style="color:#e74c3c;font-size:12px;">❌ โหลด objects.json ไม่สำเร็จ</p>';
            }
        }

        // สร้างวัตถุบน Canvas
        function createObject(type, data = {}) {
            if (type === 'player_start' && $$('.game-object[data-type="player_start"]').length >= 1) {
                return alert('มีจุดเริ่มต้น (player_start) ในด่านแล้ว! จำกัดไม่เกิน 1 อัน');
            }

            const def = loadedObjectTypes[type] || {};
            const rect = $('#workspace').getBoundingClientRect();
            const defX = Math.round((-viewX + rect.width / 2) / scale / gridSize) * gridSize;
            const defY = Math.round((-viewY + rect.height / 2) / scale / gridSize) * gridSize;

            const obj = document.createElement('div');
            obj.className = `game-object type-${type}`;
            obj.dataset.type = type;
            if (def.svg) obj.style.backgroundImage = `url("${svgToUrl(def.svg)}")`;

            const w = data.w ?? (type === 'ground' ? 400 : type === 'pipe' ? 60 : 40);
            const h = data.h ?? (type === 'ground' || type === 'pipe' ? 80 : 40);

            Object.assign(obj.style, { left: (data.x ?? defX) + 'px', top: (data.y ?? defY) + 'px', width: w + 'px', height: h + 'px' });

            if (type === 'pipe') {
                obj.dataset.pipeId = data.pipeId || `pipe_${pipeCounter++}`;
                if (data.targetPipeId) obj.dataset.targetPipeId = data.targetPipeId;
                obj.innerHTML = `<div class="pipe-badge">${obj.dataset.pipeId}</div>`;
            }

            const delBtn = document.createElement('div');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '✕';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if (selectedObj === obj) selectObject(null);
                obj.remove();
                updatePipeLines();
            };
            obj.appendChild(delBtn);

            ['tl','t','tr','r','br','b','bl','l'].forEach(dir => {
                const handle = document.createElement('div');
                handle.className = `resize-handle handle-${dir}`;
                obj.appendChild(handle);
            });

            $('#canvas').appendChild(obj);
            attachPointerEvents(obj);
            selectObject(obj);
            updatePipeLines();
        }

        // ระบบ ลาก / ย่อ-ขยาย วัตถุ
        function attachPointerEvents(obj) {
            let mode = 'none', start = {};

            obj.onpointerdown = e => {
                if (e.target.classList.contains('delete-btn')) return;
                e.stopPropagation();

                const handleMatch = e.target.className.match(/handle-([a-z]+)/);
                mode = handleMatch ? 'resize-' + handleMatch[1] : 'drag';

                start = {
                    x: e.clientX, y: e.clientY,
                    l: parseInt(obj.style.left) || 0, t: parseInt(obj.style.top) || 0,
                    w: parseInt(obj.style.width) || 40, h: parseInt(obj.style.height) || 40
                };

                selectObject(obj);

                const move = me => {
                    const dx = (me.clientX - start.x) / scale, dy = (me.clientY - start.y) / scale;

                    if (mode === 'drag') {
                        obj.style.left = Math.round((start.l + dx) / gridSize) * gridSize + 'px';
                        obj.style.top = Math.round((start.t + dy) / gridSize) * gridSize + 'px';
                    } else if (mode.startsWith('resize-')) {
                        const dir = mode.replace('resize-', '');
                        let { w, h, l, t } = start;

                        if (dir.includes('r')) w = Math.max(gridSize, Math.round((start.w + dx) / gridSize) * gridSize);
                        if (dir.includes('l')) { w = Math.max(gridSize, Math.round((start.w - dx) / gridSize) * gridSize); l = start.l + (start.w - w); }
                        if (dir.includes('b')) h = Math.max(gridSize, Math.round((start.h + dy) / gridSize) * gridSize);
                        if (dir.includes('t')) { h = Math.max(gridSize, Math.round((start.h - dy) / gridSize) * gridSize); t = start.t + (start.h - h); }

                        Object.assign(obj.style, { width: w + 'px', height: h + 'px', left: l + 'px', top: t + 'px' });
                    }

                    updateInspectorValues();
                    updatePipeLines();
                };

                const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
                window.addEventListener('pointermove', move);
                window.addEventListener('pointerup', up);
            };
        }

        // ระบบเลือกวัตถุ & Inspector
        function selectObject(obj) {
            $$('.game-object').forEach(o => o.classList.remove('selected'));
            selectedObj = obj;

            if (obj) {
                obj.classList.add('selected');
                $('#inspector-panel').style.display = 'block';
                $('#pipe-link-group').style.display = obj.dataset.type === 'pipe' ? 'flex' : 'none';
                if (obj.dataset.type === 'pipe') populatePipeOptions();
                updateInspectorValues();
            } else {
                $('#inspector-panel').style.display = 'none';
            }
        }

        function populatePipeOptions() {
            const sel = $('#sel-target-pipe');
            sel.innerHTML = '<option value="">-- ไม่วาร์ป --</option>';
            $$('.game-object[data-type="pipe"]').forEach(p => {
                if (selectedObj && p.dataset.pipeId !== selectedObj.dataset.pipeId) {
                    sel.innerHTML += `<option value="${p.dataset.pipeId}">ท่อ ${p.dataset.pipeId}</option>`;
                }
            });
            sel.value = selectedObj?.dataset.targetPipeId || '';
        }

        $('#sel-target-pipe').onchange = e => {
            if (!selectedObj || selectedObj.dataset.type !== 'pipe') return;
            if (e.target.value) selectedObj.dataset.targetPipeId = e.target.value;
            else delete selectedObj.dataset.targetPipeId;
            updatePipeLines();
        };

        function updateInspectorValues() {
            if (!selectedObj) return;
            $('#inp-w').value = parseInt(selectedObj.style.width) || 0;
            $('#inp-h').value = parseInt(selectedObj.style.height) || 0;
            $('#inp-x').value = parseInt(selectedObj.style.left) || 0;
            $('#inp-y').value = parseInt(selectedObj.style.top) || 0;
        }

        ['w','h','x','y'].forEach(p => {
            $(`#inp-${p}`).oninput = e => {
                if (!selectedObj) return;
                const val = parseInt(e.target.value) || 0;
                if (p === 'w') selectedObj.style.width = Math.max(1, val) + 'px';
                if (p === 'h') selectedObj.style.height = Math.max(1, val) + 'px';
                if (p === 'x') selectedObj.style.left = val + 'px';
                if (p === 'y') selectedObj.style.top = val + 'px';
                updatePipeLines();
            };
        });

        // เส้นเชื่อมวาร์ปท่อ
        function updatePipeLines() {
            const svg = $('#svg-layer');
            svg.innerHTML = '';
            $$('.game-object[data-type="pipe"]').forEach(p => {
                const targetId = p.dataset.targetPipeId;
                const target = targetId && $(`.game-object[data-pipe-id="${targetId}"]`);
                if (target) {
                    const x1 = parseInt(p.style.left) + parseInt(p.style.width) / 2;
                    const y1 = parseInt(p.style.top) + parseInt(p.style.height) / 2;
                    const x2 = parseInt(target.style.left) + parseInt(target.style.width) / 2;
                    const y2 = parseInt(target.style.top) + parseInt(target.style.height) / 2;

                    svg.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#2ecc71" stroke-width="3" stroke-dasharray="6"/>`;
                }
            });
        }

        // การ Pan & Zoom พื้นที่ทำงาน
        const workspace = $('#workspace');
        workspace.onpointerdown = e => {
            if (e.target === workspace || e.target === $('#canvas') || e.target === $('#svg-layer')) {
                isPanning = true;
                panStart = { x: e.clientX - viewX, y: e.clientY - viewY };
                selectObject(null);
            }
        };
        window.onpointermove = e => {
            if (isPanning) { viewX = e.clientX - panStart.x; viewY = e.clientY - panStart.y; updateTransform(); }
        };
        window.onpointerup = () => isPanning = false;

        workspace.onwheel = e => {
            e.preventDefault();
            const delta = -e.deltaY * 0.0015;
            const newScale = Math.min(Math.max(0.2, scale + delta), 2.5);
            const rect = workspace.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;

            viewX = mx - (mx - viewX) / scale * newScale;
            viewY = my - (my - viewY) / scale * newScale;
            scale = newScale;
            updateTransform();
        };

        function changeZoom(d) { scale = Math.min(Math.max(0.2, scale + d), 2.5); updateTransform(); }
        function resetZoom() { scale = 1; viewX = viewY = 0; updateTransform(); }
        function updateTransform() {
            $('#canvas').style.transform = `translate(${viewX}px, ${viewY}px) scale(${scale})`;
            $('#zoom-text').innerText = Math.round(scale * 100) + '%';
        }

        // คีย์บอร์ดเลื่อนกล้อง
        window.onkeydown = window.onkeyup = e => {
            if ($('#playtest-modal').style.display === 'flex' || ['INPUT','SELECT'].includes(document.activeElement.tagName)) return;
            const kMap = { KeyW:'up', ArrowUp:'up', KeyS:'down', ArrowDown:'down', KeyA:'left', ArrowLeft:'left', KeyD:'right', ArrowRight:'right' };
            if (kMap[e.code]) keys[kMap[e.code]] = e.type === 'keydown';
            if (e.key === 'Escape') closePlaytest();
        };

        function editorLoop() {
            if (keys.up) viewY += 10;
            if (keys.down) viewY -= 10;
            if (keys.left) viewX += 10;
            if (keys.right) viewX -= 10;
            if (keys.up || keys.down || keys.left || keys.right) updateTransform();
            requestAnimationFrame(editorLoop);
        }

        // Import / Export & Playtest Modal
        function getLevelData() {
            return Array.from($$('.game-object')).map(obj => {
                const data = {
                    type: obj.dataset.type,
                    x: parseInt(obj.style.left), y: parseInt(obj.style.top),
                    w: parseInt(obj.style.width), h: parseInt(obj.style.height)
                };
                if (obj.dataset.type === 'pipe') {
                    data.pipeId = obj.dataset.pipeId;
                    if (obj.dataset.targetPipeId) data.targetPipeId = obj.dataset.targetPipeId;
                }
                return data;
            });
        }

        function loadLevelData(data) {
            selectObject(null);
            $$('.game-object').forEach(el => el.remove());
            data.forEach(i => createObject(i.type, i));
        }

        function startPlaytest() {
            window.tempLevelData = getLevelData();
            $('#playtest-iframe').src = 'index.html?t=' + Date.now();
            $('#playtest-modal').style.display = 'flex';
            setTimeout(() => $('#playtest-iframe').contentWindow?.focus(), 100);
        }

        function closePlaytest() {
            $('#playtest-modal').style.display = 'none';
            $('#playtest-iframe').src = 'about:blank';
        }

        function exportJSON() {
            const str = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(getLevelData(), null, 2));
            const a = document.createElement('a');
            a.href = str; a.download = "level.json"; a.click();
        }

        function importJSON() { $('#file-input').click(); }
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try { loadLevelData(JSON.parse(ev.target.result)); } catch (err) { alert("ไฟล์ JSON ไม่ถูกต้อง!"); }
            };
            reader.readAsText(file);
        }

        async function initEditor() {
            await loadObjectsDefinition();
            try {
                const res = await fetch('data/level.json');
                if (res.ok) loadLevelData(await res.json());
            } catch (e) {}
            requestAnimationFrame(editorLoop);
        }

        initEditor();
    </script>
</body>
</html>
