<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Scene Map - SVG</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        svg {
            width: 100vw;
            height: 100vh;
            display: block;
            border: none;
            background-color: #87CEEB;
        }
        h1 {
            position: absolute;
            top: 10px;
            left: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Mario Scene Map</h1>
    <div id="hud" style="position: absolute; right: 20px; top: 10px; color:#333; font-weight:bold">Coins: <span id="coin-count">0</span></div>
    <svg width="100%" height="100%" viewBox="0 0 5000 400">
        <!-- Sky background -->
        <rect width="5000" height="250" fill="#87CEEB"/>
        
        <!-- Ground -->
        <rect y="250" width="5000" height="150" fill="#228B22"/>
        
        <!-- Clouds -->
        <circle cx="100" cy="50" r="30" fill="white"/>
        <circle cx="130" cy="50" r="30" fill="white"/>
        <circle cx="160" cy="50" r="30" fill="white"/>
        
        <circle cx="500" cy="80" r="25" fill="white"/>
        <circle cx="530" cy="80" r="25" fill="white"/>
        <circle cx="560" cy="80" r="25" fill="white"/>
        
        <!-- Sun -->
        <circle cx="700" cy="50" r="40" fill="#FFD700"/>
        
        <!-- Brick blocks -->
        <rect x="150" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="200" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="250" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="300" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <!-- More blocks further to the right (extended level) -->
        <rect x="500" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="550" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="600" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="650" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <!-- Additional brick blocks -->
        <rect x="800" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="850" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1000" y="210" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1050" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1100" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1200" y="190" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1250" y="190" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1300" y="190" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1400" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        <rect x="1500" y="200" width="40" height="40" fill="#8B4513" stroke="#654321" stroke-width="2"/>
        
        <!-- Question mark blocks -->
        <g class="q-block" id="q1">
            <rect x="150" y="150" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
            <text x="170" y="180" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text>
        </g>
        
        <g class="q-block" id="q2">
            <rect x="300" y="150" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
            <text x="320" y="180" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text>
        </g>
        
        <!-- Green pipes -->
        <rect x="400" y="200" width="50" height="50" fill="#228B22" stroke="#0B6623" stroke-width="2"/>
        <rect x="410" y="190" width="30" height="20" fill="#32CD32" stroke="#228B22" stroke-width="1"/>
        
        <rect x="550" y="210" width="50" height="40" fill="#228B22" stroke="#0B6623" stroke-width="2"/>
        <rect x="560" y="200" width="30" height="20" fill="#32CD32" stroke="#228B22" stroke-width="1"/>

        <!-- More pipes further right -->
        <rect x="900" y="210" width="60" height="50" fill="#228B22" stroke="#0B6623" stroke-width="2"/>
        <rect x="910" y="200" width="40" height="20" fill="#32CD32" stroke="#228B22" stroke-width="1"/>
        
        <!-- Mushroom -->
        <circle cx="600" cy="180" r="15" fill="#FF6347"/>
        <rect x="585" y="195" width="30" height="15" fill="#FF4500"/>
        <circle cx="590" cy="185" r="3" fill="#FFD700"/>
        <circle cx="600" cy="185" r="3" fill="#FFD700"/>
        <circle cx="610" cy="185" r="3" fill="#FFD700"/>
        
        <!-- Mario character (simple representation) -->
        <g id="mario">
            <!-- Head -->
            <circle cx="50" cy="280" r="15" fill="#FF9800"/>
            <!-- Body -->
            <rect x="38" y="295" width="24" height="20" fill="#FF0000"/>
            <!-- Arm left -->
            <rect x="25" y="300" width="13" height="8" fill="#FFB6C1"/>
            <!-- Arm right -->
            <rect x="62" y="300" width="13" height="8" fill="#FFB6C1"/>
            <!-- Pants -->
            <rect x="40" y="315" width="20" height="15" fill="#0033CC"/>
            <!-- Shoes -->
            <rect x="35" y="330" width="10" height="8" fill="#333"/>
            <rect x="55" y="330" width="10" height="8" fill="#333"/>
            <!-- Face -->
            <circle cx="45" cy="278" r="2" fill="#000"/>
            <circle cx="55" cy="278" r="2" fill="#000"/>
        </g>
        
        <!-- Goombas enemy -->
        <g id="goomba1">
            <!-- Body -->
            <ellipse cx="700" cy="310" rx="20" ry="15" fill="#8B4513"/>
            <!-- Left eye -->
            <circle cx="692" cy="308" r="2" fill="#000"/>
            <!-- Right eye -->
            <circle cx="708" cy="308" r="2" fill="#000"/>
            <!-- Feet -->
            <rect x="688" y="320" width="6" height="8" fill="#333"/>
            <rect x="706" y="320" width="6" height="8" fill="#333"/>
        </g>
        <!-- Another goomba further right -->
        <g id="goomba2">
            <ellipse cx="1100" cy="310" rx="20" ry="15" fill="#8B4513"/>
            <circle cx="1092" cy="308" r="2" fill="#000"/>
            <circle cx="1108" cy="308" r="2" fill="#000"/>
            <rect x="1088" y="320" width="6" height="8" fill="#333"/>
            <rect x="1106" y="320" width="6" height="8" fill="#333"/>
        </g>
        
        <!-- Many obstacle blocks across level -->
        <!-- simple obstacle blocks until end of level -->
        <g id="obstacles">
            <!-- generate visual obstacles spaced out -->
            <rect x="1700" y="230" width="60" height="20" fill="#654321"/>
            <rect x="1900" y="220" width="60" height="30" fill="#654321"/>
            <rect x="2100" y="230" width="60" height="20" fill="#654321"/>
            <rect x="2300" y="220" width="60" height="30" fill="#654321"/>
            <rect x="2500" y="230" width="60" height="20" fill="#654321"/>
            <rect x="2700" y="220" width="60" height="30" fill="#654321"/>
            <rect x="2900" y="230" width="60" height="20" fill="#654321"/>
            <rect x="3100" y="220" width="60" height="30" fill="#654321"/>
            <rect x="3300" y="230" width="60" height="20" fill="#654321"/>
            <rect x="3500" y="220" width="60" height="30" fill="#654321"/>
            <rect x="3700" y="230" width="60" height="20" fill="#654321"/>
            <rect x="3900" y="220" width="60" height="30" fill="#654321"/>
            <rect x="4100" y="230" width="60" height="20" fill="#654321"/>
            <rect x="4300" y="220" width="60" height="30" fill="#654321"/>
            <rect x="4500" y="230" width="60" height="20" fill="#654321"/>
            <rect x="4700" y="220" width="60" height="30" fill="#654321"/>
        </g>

        <!-- Stairs (can climb up/down) -->
        <g id="stairs">
            <!-- a small staircase rising up to the right -->
            <rect x="1600" y="230" width="60" height="10" fill="#8B4513"/>
            <rect x="1660" y="220" width="60" height="20" fill="#8B4513"/>
            <rect x="1720" y="210" width="60" height="30" fill="#8B4513"/>
            <!-- a descending staircase -->
            <rect x="2000" y="210" width="60" height="30" fill="#8B4513"/>
            <rect x="2060" y="220" width="60" height="20" fill="#8B4513"/>
            <rect x="2120" y="230" width="60" height="10" fill="#8B4513"/>
        </g>

        <!-- Many question mark blocks to allow collecting coins across level -->
        <g class="q-block"><rect x="600" y="150" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="620" y="180" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="900" y="150" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="920" y="180" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="1200" y="150" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="1220" y="180" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="1500" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="1520" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="1800" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="1820" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="2100" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="2120" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="2400" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="2420" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="2700" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="2720" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="3000" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="3020" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="3300" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="3320" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="3600" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="3620" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>
        <g class="q-block"><rect x="3900" y="140" width="40" height="40" fill="#FFD700" stroke="#FFA500" stroke-width="2"/><text x="3920" y="170" font-size="24" font-weight="bold" text-anchor="middle" fill="#FF6347">?</text></g>

        <!-- Jump blocks (bounce pads) -->
        <g class="jump-block" id="jb1">
            <rect x="800" y="220" width="60" height="20" fill="#00CED1" stroke="#008B8B" stroke-width="2"/>
        </g>
        <g class="jump-block" id="jb2">
            <rect x="2400" y="220" width="60" height="20" fill="#00CED1" stroke="#008B8B" stroke-width="2"/>
        </g>

        <!-- End flag at far right -->
        <g id="endFlag">
            <rect x="4950" y="220" width="5" height="120" fill="#8B4513"/>
            <polygon points="4955,240 4955,280 4985,260" fill="#FF0000"/>
        </g>
    </svg>
    <script>
        (function(){
            const mario = document.getElementById('mario');
            const svg = document.querySelector('svg');
            const LEVEL_WIDTH = 5000;
            let x = 50; // initial cx of head
            let y = 0;
            let vx = 0; // horizontal velocity
            const maxSpeed = 6; // max horizontal speed
            const accel = 0.8; // acceleration when key held
            const decel = 0.7; // deceleration when key released
            let walking = false;
            const keys = { left: false, right: false };
                const startLives = 3;
                // coin and life state
                let coins = 0;
                let lives = startLives;
                const coinCountEl = document.getElementById('coin-count');
                const hud = document.getElementById('hud');
                hud.insertAdjacentHTML('beforeend', ' | ชีวิต: ');
                const lifeCountEl = document.createElement('span');
                lifeCountEl.id = 'life-count';
                lifeCountEl.textContent = lives;
                hud.appendChild(lifeCountEl);
                const blockRects = Array.from(document.querySelectorAll('g.q-block rect, rect[fill="#8B4513"], rect[fill="#654321"]'));
                // lower question mark blocks and reduce visual height of box platforms
                blockRects.forEach(r => {
                    const isQBlock = r.parentNode.classList.contains('q-block');
                    const isBox = isQBlock || r.getAttribute('fill') === '#8B4513';
                    if (isQBlock) {
                        const newY = parseFloat(r.getAttribute('y')) + 20;
                        r.setAttribute('y', newY.toString());
                        const textEl = r.parentNode.querySelector('text');
                        if (textEl) {
                            textEl.setAttribute('y', (parseFloat(textEl.getAttribute('y')) + 20).toString());
                        }
                    }
                    if (isBox && parseFloat(r.getAttribute('height')) === 40) {
                        r.setAttribute('height', '30');
                        const textEl = r.parentNode.querySelector('text');
                        if (textEl) {
                            textEl.setAttribute('y', (parseFloat(textEl.getAttribute('y')) - 5).toString());
                        }
                    }
                });
                // prepare block bounds for standing and bumping surfaces
                const blocks = blockRects.map(r => {
                    const isQBlock = r.parentNode.classList.contains('q-block');
                    return {
                        gx: parseFloat(r.getAttribute('x')),
                        gy: parseFloat(r.getAttribute('y')),
                        gw: parseFloat(r.getAttribute('width')),
                        gh: parseFloat(r.getAttribute('height')),
                        used: false,
                        isQBlock,
                        group: isQBlock ? r.parentNode : null
                    };
                });
                const enemies = [
                    { left: 680, right: 720, top: 295, bottom: 328 },
                    { left: 1080, right: 1120, top: 295, bottom: 328 }
                ];
                const hurtCooldownMax = 30;
                let hurtCooldown = 0;
            // jumping physics
            let vy = 0;
            const gravity = 1.4;
            const jumpStrength = -21;
            const fallMultiplier = 1.4;
            const groundY = 0; // translate y == 0 means standing on ground as drawn
            let jumpCount = 0;
            const maxJumps = 2;
            let prevHeadY = 280; // previous absolute head cy
            let prevFeetY = 338; // previous absolute foot y
            let onSurface = true;
            let won = false;
            const endFlagX = 4950;

            function resetGameState() {
                x = 50;
                y = 0;
                vx = 0;
                vy = 0;
                onSurface = true;
                coins = 0;
                lives = startLives;
                coinCountEl.textContent = coins;
                lifeCountEl.textContent = lives;
                hurtCooldown = 0;
                for (const b of blocks) b.used = false;
            }

            function loseLife() {
                if (hurtCooldown > 0 || lives <= 0) return;
                lives -= 1;
                lifeCountEl.textContent = lives;
                hurtCooldown = hurtCooldownMax;
                x = 50;
                y = 0;
                vx = 0;
                vy = 0;
                onSurface = true;
                if (lives <= 0) {
                    const overlay = document.createElement('div');
                    overlay.id = 'gameOverOverlay';
                    overlay.style.position = 'fixed';
                    overlay.style.left = '0';
                    overlay.style.top = '0';
                    overlay.style.width = '100%';
                    overlay.style.height = '100%';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.backgroundColor = 'rgba(0,0,0,0.7)';
                    overlay.style.color = '#fff';
                    overlay.style.fontSize = '36px';
                    overlay.style.zIndex = 9999;
                    overlay.textContent = 'เกมจบแล้ว! รีสตาร์ทเกม...';
                    document.body.appendChild(overlay);
                    setTimeout(() => {
                        overlay.remove();
                        resetGameState();
                        won = false;
                        update();
                    }, 1500);
                } else {
                    update();
                }
            }

            function clamp(value, min, max){ return Math.max(min, Math.min(max, value)); }

            function update() {
                // Keep Mario within level bounds (0..LEVEL_WIDTH)
                x = clamp(x, 0, LEVEL_WIDTH - 40);
                // apply translate to mario
                mario.setAttribute('transform', `translate(${x},${y})`);
                // camera follows mario horizontally but stays fixed vertically
                const marioScreenX = 50 + x;
                const cameraWidth = 800;
                const cameraHeight = 400;
                const cameraX = marioScreenX - cameraWidth / 2; // center on mario horizontally
                const cameraY = 0; // keep vertical view fixed so only character moves up/down
                svg.setAttribute('viewBox', `${cameraX} ${cameraY} ${cameraWidth} ${cameraHeight}`);
            }

            // initialize position (original drawing assumes cx=50 head, so translate 0)
            update();

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    keys.right = true;
                    walking = true;
                } else if (e.key === 'ArrowLeft') {
                    keys.left = true;
                    walking = true;
                } else if (e.key === ' ' || e.key === 'ArrowUp') {
                    // jump if on ground or on a platform
                    if (onSurface) {
                        vy = jumpStrength;
                        onSurface = false;
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowRight') keys.right = false;
                if (e.key === 'ArrowLeft') keys.left = false;
                if (!keys.left && !keys.right) walking = false;
            });

            // animation loop for gravity and smooth movement
            function loop(){
                // apply physics
                vy += gravity * (vy > 0 ? fallMultiplier : 1);
                y += vy;
                onSurface = false;
                if (y > groundY) { y = groundY; vy = 0; onSurface = true; }
                if (hurtCooldown > 0) hurtCooldown -= 1;

                // collision with question blocks from below to release coin
                // head absolute position
                const marioLeft = 35 + x;
                const marioRight = 65 + x;
                const headX = 50 + x;
                const headY = 280 + y;
                const feetY = 338 + y;

                for (const e of enemies) {
                    if (hurtCooldown <= 0 && marioRight >= e.left && marioLeft <= e.right && feetY >= e.top && headY <= e.bottom) {
                        loseLife();
                        break;
                    }
                }

                for (const b of blocks) {
                    const blockLeft = b.gx;
                    const blockRight = b.gx + b.gw;
                    const blockTop = b.gy;
                    const blockBottom = b.gy + b.gh;
                    const horizontalHit = marioRight >= blockLeft && marioLeft <= blockRight;

                    // land on top of the block or stay on top when already there
                    if (vy >= 0 && prevFeetY <= blockTop + 6 && feetY >= blockTop && horizontalHit) {
                        y = blockTop - 338;
                        vy = 0;
                        onSurface = true;
                    }

                    // check upward collision: only Q-blocks should block from below
                    if (b.isQBlock && vy < 0 && prevHeadY > blockBottom && headY <= blockBottom && horizontalHit) {
                        if (!b.used) {
                            b.used = true;
                            const coin = document.createElementNS('http://www.w3.org/2000/svg','circle');
                            coin.setAttribute('cx', (b.gx + b.gw/2));
                            coin.setAttribute('cy', b.gy - 10);
                            coin.setAttribute('r', 8);
                            coin.setAttribute('fill','#FFD700');
                            svg.appendChild(coin);
                            const anim = coin.animate([
                                { transform: 'translateY(0)', opacity: 1 },
                                { transform: 'translateY(-60px)', opacity: 0 }
                            ], { duration: 700, easing: 'cubic-bezier(.2,.8,.2,1)'});
                            anim.onfinish = () => { coin.remove(); };
                            coins += 1;
                            coinCountEl.textContent = coins;
                        }
                        // play bump: stop upward movement and nudge down. Animate only if group exists.
                        vy = 4;
                        if (b.group && typeof b.group.animate === 'function') {
                            b.group.animate([{transform: 'translate(0,0)'},{transform:'translate(0,6)'},{transform:'translate(0,0)'}],{duration:150});
                        }
                    }
                }
                prevHeadY = headY;
                prevFeetY = feetY;

                // check for reaching end flag
                if (!won && headX >= endFlagX) {
                    won = true;
                    // show win message overlay
                    const overlay = document.createElement('div');
                    overlay.id = 'winOverlay';
                    overlay.style.position = 'fixed';
                    overlay.style.left = '0';
                    overlay.style.top = '0';
                    overlay.style.width = '100%';
                    overlay.style.height = '100%';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
                    overlay.style.color = '#fff';
                    overlay.style.fontSize = '36px';
                    overlay.style.zIndex = 9999;
                    overlay.textContent = 'ชนะเกม! เริ่มเกมใหม่...';
                    document.body.appendChild(overlay);
                    // after short delay restart
                    setTimeout(() => {
                        // remove overlay
                        overlay.remove();
                        // reset game state
                        resetGameState();
                        won = false;
                        update();
                    }, 1500);
                }

                // horizontal movement smoothing
                if (keys.right && !keys.left) {
                    vx += accel;
                } else if (keys.left && !keys.right) {
                    vx -= accel;
                } else {
                    // apply deceleration toward zero
                    if (vx > 0) vx = Math.max(0, vx - decel);
                    else if (vx < 0) vx = Math.min(0, vx + decel);
                }
                // clamp speed
                vx = Math.max(-maxSpeed, Math.min(maxSpeed, vx));
                // apply velocity to position
                x += vx;

                update();
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
