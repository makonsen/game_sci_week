<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>2D Platformer Game</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            background-color: #87CEEB;
            border: 3px solid #fff;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let levelInstances = [];
        const loadedObjectTypes = {};
        const loadedCharacters = {};

        // พิกัดจุดเกิดของผู้เล่น (ตั้งค่าเริ่มต้นไว้ก่อน)
        let spawnX = 50;
        let spawnY = 100;

        function svgToImage(svgString) {
            const img = new Image();
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            img.src = URL.createObjectURL(blob);
            return img;
        }

        // 1. ระบบโหลดไฟล์ JSON
        async function loadGameData() {
            try {
                const [objectsRes, charsRes] = await Promise.all([
                    fetch('data/objects.json'),
                    fetch('data/characters.json')
                ]);

                if (window.parent && window.parent.tempLevelData && window.parent.tempLevelData.length > 0) {
                    levelInstances = window.parent.tempLevelData;
                } else {
                    const levelRes = await fetch('data/level.json');
                    levelInstances = await levelRes.json();
                }

                // 🔹 ดึงจุดเริ่มต้น (player_start) มากำหนดพิกัดให้ตัวละคร
                const startObjs = levelInstances.filter(item => item.type === 'player_start');
                if (startObjs.length > 0) {
                    spawnX = startObjs[0].x;
                    spawnY = startObjs[0].y;
                    player.x = spawnX;
                    player.y = spawnY;
                }

                // 🔹 ลบ player_start ออกจากฉากทั้งหมด
                levelInstances = levelInstances.filter(item => item.type !== 'player_start');

                const objectsData = await objectsRes.json();
                const charsData = await charsRes.json();

                for (const [typeKey, objDef] of Object.entries(objectsData)) {
                    loadedObjectTypes[typeKey] = {
                        name: objDef.name,
                        solid: objDef.solid ?? true,
                        img: svgToImage(objDef.svg)
                    };
                }

                charsData.characters.forEach(char => {
                    loadedCharacters[char.id] = {
                        name: char.name,
                        imgNormal: svgToImage(char.svgNormal),
                        imgCrouch: svgToImage(char.svgCrouch)
                    };
                });

                gameLoop();
            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดไฟล์ JSON:", error);
            }
        }

        // 2. ตัวแปรเกม
        const worldWidth = 5000;
        const gravity = 0.6;
        let cameraX = 0;

        // ระบบควบคุมแบบดั้งเดิม (รองรับ Left, Right, Up, Down)
        const keys = { left: false, right: false, up: false, down: false };

        const player = {
            x: spawnX,
            y: spawnY,
            normalHeight: 50,
            crouchHeight: 25,
            width: 40,
            height: 50,
            vx: 0,
            vy: 0,
            speed: 5,         // ความเร็วเดินปกติ
            crouchSpeed: 2.5, // ความเร็วหมอบเดิน
            jumpForce: -12,
            isGrounded: false,
            isCrouching: false,
            // สถานะมุดท่อ
            isPipeTraversing: false,
            pipeState: 'none', // 'entering' | 'exiting'
            pipeTarget: null,
            pipeSpeed: 2,
            selectedCharacterId: "hero_red"
        };

        // Event Listeners สำหรับการกดปุ่ม (WASD + ลูกศร + Space)
        window.addEventListener("keydown", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
            if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.up = true;
            if (e.code === "ArrowDown" || e.code === "KeyS") keys.down = true;
        });

        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
            if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.up = false;
            if (e.code === "ArrowDown" || e.code === "KeyS") keys.down = false;
        });

        function isColliding(rect1, instance) {
            const objH = instance.h ?? instance.w;
            return rect1.x < instance.x + instance.w &&
                rect1.x + rect1.width > instance.x &&
                rect1.y < instance.y + objH &&
                rect1.y + rect1.height > instance.y;
        }

        function canStandUp() {
            const heightDiff = player.normalHeight - player.crouchHeight;
            const standingBox = {
                x: player.x,
                y: player.y - heightDiff,
                width: player.width,
                height: player.normalHeight
            };

            for (let instance of levelInstances) {
                const typeDef = loadedObjectTypes[instance.type];
                if (typeDef && typeDef.solid && isColliding(standingBox, instance)) {
                    return false;
                }
            }
            return true;
        }

        function checkPipeEnter() {
            if (!keys.down || !player.isGrounded || player.isPipeTraversing) return;

            for (let instance of levelInstances) {
                if (instance.type === 'pipe' && instance.targetPipeId) {
                    const playerCenterX = player.x + (player.width / 2);
                    const pipeCenterX = instance.x + (instance.w / 2);

                    const isOnTop = Math.abs(playerCenterX - pipeCenterX) < 20 &&
                                    Math.abs((player.y + player.height) - instance.y) < 5;

                    if (isOnTop) {
                        const targetObj = levelInstances.find(item => item.pipeId === instance.targetPipeId);
                        if (targetObj) {
                            player.isPipeTraversing = true;
                            player.pipeState = 'entering';
                            player.pipeTarget = targetObj;
                            player.x = pipeCenterX - (player.width / 2);
                            player.vx = 0;
                            player.vy = 0;
                            break;
                        }
                    }
                }
            }
        }

        function resetPlayer() {
            player.x = spawnX;
            player.y = spawnY;
            player.vx = 0;
            player.vy = 0;
            player.isCrouching = false;
            player.height = player.normalHeight;
        }

        // 3. ระบบคำนวณการเคลื่อนที่และการชน
        function update() {
            // ระบบย้ายตำแหน่งขณะมุดท่อ
            if (player.isPipeTraversing) {
                if (player.pipeState === 'entering') {
                    player.y += player.pipeSpeed;
                    if (player.y >= player.y + player.height || player.y > player.pipeTarget.y) {
                        player.x = player.pipeTarget.x + (player.pipeTarget.w / 2) - (player.width / 2);
                        player.y = player.pipeTarget.y + player.pipeTarget.h;
                        player.pipeState = 'exiting';
                    }
                } else if (player.pipeState === 'exiting') {
                    player.y -= player.pipeSpeed;
                    if (player.y <= player.pipeTarget.y - player.height) {
                        player.y = player.pipeTarget.y - player.height;
                        player.isPipeTraversing = false;
                        player.pipeState = 'none';
                        player.pipeTarget = null;
                        player.isGrounded = true;
                    }
                }
                return;
            }

            checkPipeEnter();

            // ระบบหมอบ / ยืน
            const heightDiff = player.normalHeight - player.crouchHeight;
            if (keys.down && player.isGrounded) {
                if (!player.isCrouching) {
                    player.isCrouching = true;
                    player.y += heightDiff;
                    player.height = player.crouchHeight;
                }
            } else if (player.isCrouching) {
                if (canStandUp()) {
                    player.isCrouching = false;
                    player.y -= heightDiff;
                    player.height = player.normalHeight;
                }
            }

            // คำนวณการเคลื่อนที่แกน X (ควบคุมด้วยปุ่มซ้าย/ขวา)
            const currentSpeed = player.isCrouching ? player.crouchSpeed : player.speed;
            player.vx = 0;
            if (keys.left) player.vx = -currentSpeed;
            if (keys.right) player.vx = currentSpeed;

            player.x += player.vx;

            // ตรวจสอบการชนแกน X
            for (let instance of levelInstances) {
                const typeDef = loadedObjectTypes[instance.type];
                if (typeDef && typeDef.solid && isColliding(player, instance)) {
                    if (player.vx > 0) player.x = instance.x - player.width;
                    else if (player.vx < 0) player.x = instance.x + instance.w;
                }
            }

            // ล็อคขอบแมพ
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > worldWidth) player.x = worldWidth - player.width;

            // กระโดด
            if (keys.up && player.isGrounded) {
                player.vy = player.jumpForce;
                player.isGrounded = false;
            }

            // แรงโน้มถ่วงและการเคลื่อนที่แกน Y
            player.vy += gravity;
            player.y += player.vy;
            player.isGrounded = false;

            // ตรวจสอบการชนแกน Y
            for (let instance of levelInstances) {
                const typeDef = loadedObjectTypes[instance.type];
                if (typeDef && typeDef.solid && isColliding(player, instance)) {
                    const objH = instance.h ?? instance.w;
                    if (player.vy > 0) {
                        player.y = instance.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                    } else if (player.vy < 0) {
                        player.y = instance.y + objH;
                        player.vy = 0;
                    }
                }
            }

            // ตกแมพ = กลับไปเกิดที่ player_start
            if (player.y > canvas.height + 200) {
                resetPlayer();
            }

            // กล้องตามตัวละคร
            cameraX = (player.x + player.width / 2) - canvas.width / 2;
            if (cameraX < 0) cameraX = 0;
            if (cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;
        }

        // 4. วาดฉาก
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Layer 1: วัตถุทั่วไป
            for (let instance of levelInstances) {
                if (instance.type !== 'pipe') {
                    const typeDef = loadedObjectTypes[instance.type];
                    if (typeDef && typeDef.img) {
                        const h = instance.h ?? instance.w;
                        ctx.drawImage(typeDef.img, instance.x, instance.y, instance.w, h);
                    }
                }
            }

            // Layer 2: ตัวละคร
            const currentChar = loadedCharacters[player.selectedCharacterId];
            if (currentChar) {
                const activeImg = player.isCrouching ? currentChar.imgCrouch : currentChar.imgNormal;
                ctx.drawImage(activeImg, player.x, player.y, player.width, player.height);
            }

            // Layer 3: ท่อ (วาดทับตัวละครเวลาซ่อนมุดท่อ)
            for (let instance of levelInstances) {
                if (instance.type === 'pipe') {
                    const typeDef = loadedObjectTypes[instance.type];
                    if (typeDef && typeDef.img) {
                        const h = instance.h ?? instance.w;
                        ctx.drawImage(typeDef.img, instance.x, instance.y, instance.w, h);
                    }
                }
            }

            ctx.restore();

            // UI แสดงตำแหน่ง
            ctx.fillStyle = "black";
            ctx.font = "16px sans-serif";
            ctx.fillText(`Controls: WASD / Arrow Keys | X: ${Math.floor(player.x)} Y: ${Math.floor(player.y)}`, 10, 25);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        loadGameData();
    </script>

</body>

</html>
